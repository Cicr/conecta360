openapi: "3.1.0"
info:
  title: Conecta360 API
  version: "1.0.0"
  description: |
    API RESTful del Sistema Integral de Atención Ciudadana **Conecta360**.
    Costa Verde — Entregable §7.4
  contact:
    name: Equipo Técnico Conecta360
    email: arquitectura@conecta360.gob.cv
  license:
    name: Gobierno de Costa Verde
servers:
  - url: https://api.conecta360.gob.cv/api/v1
    description: Producción
  - url: https://api-staging.conecta360.gob.cv/api/v1
    description: Staging

security:
  - BearerAuth: []

tags:
  - name: cases
    description: Gestión del ciclo de vida de casos ciudadanos
  - name: citizens
    description: Gestión de perfiles ciudadanos
  - name: notifications
    description: Consulta de notificaciones
  - name: institutions
    description: Administración de instituciones y SLAs
  - name: analytics
    description: KPIs y reportes de desempeño
  - name: chat
    description: Interacción con el chatbot de IA

paths:
  # ─── CASES ────────────────────────────────────────────────
  /cases:
    post:
      summary: Crear un nuevo caso
      operationId: createCase
      tags: [cases]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
            example:
              category_code: "VIA_BACHE"
              title: "Bache profundo en Avenida Principal #120"
              description: "Existe un bache de aproximadamente 40cm de diámetro que representa un peligro para los vehículos y peatones."
              channel: "web"
              location_address: "Avenida Principal #120, San Cristóbal"
              location_lat: 9.748917
              location_lng: -83.753428
      responses:
        '201':
          description: Caso creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
              example:
                case_id: "018f1c2d-3e4f-7890-abcd-ef1234567890"
                case_number: "C360-2026-000042"
                status: "received"
                priority: "medium"
                institution:
                  institution_id: "inst-obras-publicas"
                  name: "Ministerio de Obras Públicas"
                sla_deadline: "2026-05-13T19:55:00Z"
                created_at: "2026-05-11T19:55:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    get:
      summary: Listar casos con filtros y paginación
      operationId: listCases
      tags: [cases]
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CaseStatus'
        - name: institution_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category_code
          in: query
          schema:
            type: string
        - name: assigned_user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          description: Cursor de paginación (case_id del último elemento)
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: created_from
          in: query
          schema:
            type: string
            format: date-time
        - name: created_to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Lista de casos paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseListResponse'
              example:
                data:
                  - case_id: "018f1c2d-3e4f-7890-abcd-ef1234567890"
                    case_number: "C360-2026-000042"
                    title: "Bache profundo en Avenida Principal #120"
                    status: "in_progress"
                    priority: "medium"
                    created_at: "2026-05-11T19:55:00Z"
                pagination:
                  next_cursor: "018f1c2d-3e4f-7890-abcd-ef1234567891"
                  has_more: true
                  total_count: 1247
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cases/{caseId}:
    get:
      summary: Obtener detalle de un caso
      operationId: getCase
      tags: [cases]
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalle completo del caso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseDetailResponse'
              example:
                case_id: "018f1c2d-3e4f-7890-abcd-ef1234567890"
                case_number: "C360-2026-000042"
                title: "Bache profundo en Avenida Principal #120"
                description: "Existe un bache de aproximadamente 40cm de diámetro..."
                status: "in_progress"
                priority: "medium"
                channel: "web"
                citizen:
                  citizen_id: "cit-uuid-001"
                  first_name: "María"
                  last_name: "González"
                institution:
                  institution_id: "inst-obras-publicas"
                  name: "Ministerio de Obras Públicas"
                assigned_user:
                  user_id: "usr-uuid-123"
                  first_name: "Juan"
                  last_name: "Pérez"
                location:
                  address: "Avenida Principal #120, San Cristóbal"
                  lat: 9.748917
                  lng: -83.753428
                sla_deadline: "2026-05-13T19:55:00Z"
                events:
                  - event_id: "evt-001"
                    event_type: "created"
                    to_status: "received"
                    is_public: true
                    created_at: "2026-05-11T19:55:00Z"
                  - event_id: "evt-002"
                    event_type: "assigned"
                    to_status: "assigned"
                    comment: "Asignado al inspector de zona norte."
                    is_public: false
                    created_at: "2026-05-11T20:10:00Z"
                created_at: "2026-05-11T19:55:00Z"
                updated_at: "2026-05-11T20:10:00Z"
        '404':
          $ref: '#/components/responses/NotFound'

  /cases/{caseId}/status:
    put:
      summary: Actualizar el estado de un caso
      operationId: updateCaseStatus
      tags: [cases]
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCaseStatusRequest'
            example:
              status: "resolved"
              comment: "Bache reparado. Se aplicó mezcla asfáltica en frío. Trabajo completado."
              is_public: true
      responses:
        '200':
          description: Estado actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseStatusUpdateResponse'
              example:
                case_id: "018f1c2d-3e4f-7890-abcd-ef1234567890"
                case_number: "C360-2026-000042"
                previous_status: "in_progress"
                current_status: "resolved"
                resolved_at: "2026-05-12T14:30:00Z"
                event_id: "evt-003"
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Transición de estado inválida
          content:
            application/json:
              example:
                error: "INVALID_STATE_TRANSITION"
                message: "No se puede pasar de 'closed' a 'in_progress'."

  /cases/{caseId}/assign:
    put:
      summary: Asignar un caso a un funcionario
      operationId: assignCase
      tags: [cases]
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignCaseRequest'
            example:
              user_id: "usr-uuid-456"
              reason: "Asignación automática por carga balanceada."
      responses:
        '200':
          description: Caso asignado exitosamente
          content:
            application/json:
              example:
                case_id: "018f1c2d-3e4f-7890-abcd-ef1234567890"
                assigned_user_id: "usr-uuid-456"
                assigned_at: "2026-05-11T20:15:00Z"

  /cases/{caseId}/satisfaction:
    post:
      summary: Ciudadano califica la atención recibida
      operationId: rateCaseSatisfaction
      tags: [cases]
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
                  maxLength: 500
            example:
              score: 4
              comment: "El problema fue resuelto, aunque tardó un poco más de lo esperado."
      responses:
        '200':
          description: Calificación registrada
          content:
            application/json:
              example:
                case_id: "018f1c2d-3e4f-7890-abcd-ef1234567890"
                satisfaction_score: 4
                rated_at: "2026-05-14T10:00:00Z"

  # ─── CITIZENS ─────────────────────────────────────────────
  /citizens:
    post:
      summary: Registrar un ciudadano
      operationId: registerCitizen
      tags: [citizens]
      security:
        - BearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCitizenRequest'
            example:
              national_id: "1-0234-0567"
              national_id_type: "cedula"
              first_name: "María"
              last_name: "González Jiménez"
              email: "maria.gonzalez@correo.cv"
              phone_number: "+50688887777"
              preferred_channel: "email"
              consent_notifications: true
      responses:
        '201':
          description: Ciudadano registrado
          content:
            application/json:
              example:
                citizen_id: "cit-uuid-001"
                first_name: "María"
                last_name: "González Jiménez"
                preferred_channel: "email"
                created_at: "2026-05-11T19:55:00Z"
        '409':
          description: Cédula ya registrada
          content:
            application/json:
              example:
                error: "CITIZEN_ALREADY_EXISTS"
                message: "Ya existe un ciudadano registrado con esa cédula."

  /citizens/me:
    get:
      summary: Obtener perfil del ciudadano autenticado
      operationId: getMyCitizenProfile
      tags: [citizens]
      responses:
        '200':
          description: Perfil del ciudadano
          content:
            application/json:
              example:
                citizen_id: "cit-uuid-001"
                national_id_type: "cedula"
                first_name: "María"
                last_name: "González Jiménez"
                email: "maria.gonzalez@correo.cv"
                phone_number: "+50688887777"
                preferred_channel: "email"
                consent_notifications: true
                created_at: "2026-05-11T19:55:00Z"

  /citizens/me/cases:
    get:
      summary: Listar casos del ciudadano autenticado
      operationId: getMyCases
      tags: [citizens, cases]
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CaseStatus'
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Lista de casos del ciudadano
          content:
            application/json:
              example:
                data:
                  - case_id: "018f1c2d-3e4f-7890-abcd-ef1234567890"
                    case_number: "C360-2026-000042"
                    title: "Bache profundo en Avenida Principal #120"
                    status: "resolved"
                    created_at: "2026-05-11T19:55:00Z"
                pagination:
                  has_more: false
                  total_count: 3

  # ─── NOTIFICATIONS ─────────────────────────────────────────
  /notifications:
    get:
      summary: Listar notificaciones del usuario autenticado
      operationId: listNotifications
      tags: [notifications]
      parameters:
        - name: case_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, sent, delivered, failed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de notificaciones
          content:
            application/json:
              example:
                data:
                  - notification_id: "notif-001"
                    case_number: "C360-2026-000042"
                    channel: "email"
                    subject: "Actualización de tu caso C360-2026-000042"
                    status: "delivered"
                    sent_at: "2026-05-11T20:10:00Z"
                    delivered_at: "2026-05-11T20:10:35Z"

  # ─── ANALYTICS ────────────────────────────────────────────
  /analytics/dashboard:
    get:
      summary: Obtener KPIs globales del dashboard
      operationId: getDashboard
      tags: [analytics]
      parameters:
        - name: institution_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por institución (solo para supervisores)
        - name: period
          in: query
          schema:
            type: string
            enum: [today, last_7_days, last_30_days, last_90_days]
            default: last_30_days
      responses:
        '200':
          description: KPIs del dashboard
          content:
            application/json:
              example:
                period: "last_30_days"
                generated_at: "2026-05-11T20:00:00Z"
                kpis:
                  total_cases: 128450
                  cases_open: 4320
                  cases_resolved: 118730
                  cases_closed: 5400
                  avg_resolution_hours: 36.4
                  sla_compliance_rate: 0.923
                  citizen_satisfaction_avg: 4.1
                  cases_by_channel:
                    web: 54230
                    mobile: 38100
                    phone: 20450
                    social: 10870
                    in_person: 4800
                  cases_by_status:
                    received: 1200
                    assigned: 1100
                    in_progress: 2020
                    pending_info: 0
                    resolved: 118730
                    closed: 5400
                  top_categories:
                    - code: "VIA_BACHE"
                      name: "Bache en vía"
                      count: 38200
                    - code: "ENERGIA_AVERIA"
                      name: "Avería eléctrica"
                      count: 22100

  /analytics/reports:
    post:
      summary: Solicitar generación de reporte exportable
      operationId: requestReport
      tags: [analytics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report_type, period_from, period_to, format]
              properties:
                report_type:
                  type: string
                  enum: [cases_summary, sla_compliance, citizen_satisfaction, agent_performance]
                period_from:
                  type: string
                  format: date
                period_to:
                  type: string
                  format: date
                institution_id:
                  type: string
                  format: uuid
                format:
                  type: string
                  enum: [csv, excel, pdf]
            example:
              report_type: "sla_compliance"
              period_from: "2026-04-01"
              period_to: "2026-04-30"
              institution_id: "inst-obras-publicas"
              format: "excel"
      responses:
        '202':
          description: Reporte en generación. Se notificará cuando esté listo.
          content:
            application/json:
              example:
                report_id: "rpt-uuid-001"
                status: "processing"
                estimated_ready_at: "2026-05-11T20:05:00Z"
                message: "El reporte estará disponible en aproximadamente 2 minutos. Recibirá una notificación."

  # ─── CHAT ─────────────────────────────────────────────────
  /chat/message:
    post:
      summary: Enviar mensaje al chatbot de IA
      operationId: sendChatMessage
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                session_id:
                  type: string
                  description: ID de sesión de conversación (opcional para primera interacción)
                message:
                  type: string
                  maxLength: 2000
            example:
              session_id: "chat-session-abc123"
              message: "Quiero reportar un bache en mi calle, ¿cómo lo hago?"
      responses:
        '200':
          description: Respuesta del chatbot
          content:
            application/json:
              example:
                session_id: "chat-session-abc123"
                response: "Claro, puedo ayudarte a reportar un bache. Para eso necesito algunos datos: ¿puedes indicarme la dirección exacta donde se encuentra el bache?"
                confidence_score: 0.94
                suggested_category: "VIA_BACHE"
                escalate_to_human: false
                quick_replies:
                  - "Sí, voy a indicar la dirección"
                  - "Prefiero hablar con un agente"
                  - "Ver mis casos anteriores"

# ─── COMPONENTS ───────────────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT emitido por el Auth Service de Conecta360.
        Para ciudadanos: obtenido vía OIDC con el SSO Nacional.
        Para funcionarios: obtenido vía OAuth2 con credenciales institucionales.

  schemas:
    CaseStatus:
      type: string
      enum: [received, assigned, in_progress, pending_info, resolved, closed, cancelled]

    Priority:
      type: string
      enum: [low, medium, high, critical]

    Channel:
      type: string
      enum: [web, mobile, phone, social, in_person]

    CreateCaseRequest:
      type: object
      required: [category_code, title, description, channel]
      properties:
        category_code:
          type: string
          example: "VIA_BACHE"
        title:
          type: string
          maxLength: 300
        description:
          type: string
          maxLength: 5000
        channel:
          $ref: '#/components/schemas/Channel'
        location_address:
          type: string
          maxLength: 500
        location_lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
        location_lng:
          type: number
          format: double
          minimum: -180
          maximum: 180

    UpdateCaseStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/CaseStatus'
        comment:
          type: string
          maxLength: 2000
        is_public:
          type: boolean
          default: false

    AssignCaseRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 500

    CreateCitizenRequest:
      type: object
      required: [national_id, national_id_type, first_name, last_name, consent_notifications]
      properties:
        national_id:
          type: string
          maxLength: 20
        national_id_type:
          type: string
          enum: [cedula, pasaporte, extranjeria]
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phone_number:
          type: string
          pattern: '^\+?[1-9]\d{7,14}$'
        preferred_channel:
          type: string
          enum: [email, sms, push, whatsapp]
          default: email
        consent_notifications:
          type: boolean

    CaseResponse:
      type: object
      properties:
        case_id:
          type: string
          format: uuid
        case_number:
          type: string
          example: "C360-2026-000042"
        status:
          $ref: '#/components/schemas/CaseStatus'
        priority:
          $ref: '#/components/schemas/Priority'
        institution:
          type: object
          properties:
            institution_id:
              type: string
              format: uuid
            name:
              type: string
        sla_deadline:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CaseDetailResponse:
      allOf:
        - $ref: '#/components/schemas/CaseResponse'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            channel:
              $ref: '#/components/schemas/Channel'
            citizen:
              type: object
              properties:
                citizen_id:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
            assigned_user:
              type: object
              nullable: true
              properties:
                user_id:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
            location:
              type: object
              nullable: true
              properties:
                address:
                  type: string
                lat:
                  type: number
                lng:
                  type: number
            events:
              type: array
              items:
                $ref: '#/components/schemas/CaseEvent'
            updated_at:
              type: string
              format: date-time

    CaseEvent:
      type: object
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
          enum: [created, status_changed, assigned, reassigned, commented, resolved, closed, escalated]
        from_status:
          type: string
          nullable: true
        to_status:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time

    CaseListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CaseResponse'
        pagination:
          type: object
          properties:
            next_cursor:
              type: string
              nullable: true
            has_more:
              type: boolean
            total_count:
              type: integer

    CaseStatusUpdateResponse:
      type: object
      properties:
        case_id:
          type: string
          format: uuid
        case_number:
          type: string
        previous_status:
          $ref: '#/components/schemas/CaseStatus'
        current_status:
          $ref: '#/components/schemas/CaseStatus'
        resolved_at:
          type: string
          format: date-time
          nullable: true
        event_id:
          type: string
          format: uuid

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: "VALIDATION_ERROR"
        message:
          type: string
          example: "El campo 'title' es requerido."
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
        trace_id:
          type: string
          description: ID de trazabilidad para soporte técnico

  responses:
    BadRequest:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "VALIDATION_ERROR"
            message: "Datos de entrada inválidos."
            details:
              - field: "title"
                message: "El campo 'title' no puede estar vacío."
            trace_id: "trace-abc-123"

    Unauthorized:
      description: Token JWT inválido o expirado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "UNAUTHORIZED"
            message: "Token de acceso inválido o expirado."

    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "NOT_FOUND"
            message: "El caso solicitado no existe o no tiene permisos para verlo."

    UnprocessableEntity:
      description: Error de lógica de negocio
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "CATEGORY_NOT_FOUND"
            message: "La categoría 'VIA_BACHE_XYZ' no existe en el catálogo."
